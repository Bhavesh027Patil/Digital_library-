<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

    <span class="navbar-brand">📚 Digital Library</span>

    <div class="ms-auto d-flex gap-2">

        <a href="/upload" class="btn btn-success btn-sm">Upload</a>

        <button onclick="toggleDarkMode()" class="btn btn-light btn-sm">🌙</button>

        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>

    </div>

</nav>

<div class="container mt-4">

    <h2>Available Notes</h2>

    <!-- 🔍 Live Search -->
    <input type="text" id="searchBox"
           placeholder="Search notes..."
           class="form-control mb-4">

    <!-- 📦 Cards -->
    <div id="notesContainer" class="row">

        {% for note in notes %}
        <div class="col-md-4 mb-4">

            <div class="card shadow-sm h-100 note-card">

                <div class="card-body">

                    <h5>📄 {{ note[1] }}</h5>
                    <p class="text-muted">{{ note[2] }}</p>

                    <div class="d-flex justify-content-between">

                        <!-- 👁 VIEW -->
                        <a href="/uploads/{{ note[3] }}" target="_blank"
                           class="btn btn-outline-primary btn-sm">
                            View
                        </a>

                        <!-- ⬇ DOWNLOAD -->
                        <a href="{{ url_for('uploaded_file', filename=note[3]) }}"
                           class="btn btn-primary btn-sm">
                            Download
                        </a>

                    </div>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

<!-- ⚡ JavaScript -->
<script>

// 🔍 Live Search
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("keyup", function() {
    let query = searchBox.value;

    fetch(`/search?q=${query}`)
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("notesContainer");
            container.innerHTML = "";

            data.data.forEach(note => {
                let card = `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm h-100 note-card">
                        <div class="card-body">
                            <h5>📄 ${note[1]}</h5>
                            <p class="text-muted">${note[2]}</p>

                            <div class="d-flex justify-content-between">
                                <a href="/uploads/${note[3]}" target="_blank"
                                   class="btn btn-outline-primary btn-sm">View</a>

                                <a href="/uploads/${note[3]}"
                                   class="btn btn-primary btn-sm">Download</a>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += card;
            });

        });
});

// 🌙 Dark Mode
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
