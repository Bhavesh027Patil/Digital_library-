<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📚 Digital Library</span>
    <div>
        <a href="/upload" class="btn btn-success btn-sm">Upload</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h2>Available Notes</h2>

    <!-- 🔍 Search Bar -->
    <form method="GET" class="mb-3 position-relative">

    <input type="text" name="search"
           placeholder="Search notes..."
           class="form-control pe-5"
           value="{{ request.args.get('search', '') }}">

    <!-- ❌ Clear icon -->
    {% if request.args.get('search') %}
    <a href="/notes"
       style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); text-decoration: none; font-size: 20px;">
        ❌
    </a>
    {% endif %}

</form>

    {% if notes %}
    <table class="table table-bordered table-hover mt-3">

        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Subject</th>
                <th>Download</th>
            </tr>
        </thead>

        <tbody>
        {% for note in notes %}
            <tr>
                <td>{{ note[1] }}</td>
                <td>{{ note[2] }}</td>
                <td>
                    <a href="{{ url_for('uploaded_file', filename=note[3]) }}" 
                       class="btn btn-primary btn-sm">
                        Download
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>
    {% else %}
        <p class="text-muted">No notes available yet 😅</p>
    {% endif %}

</div>

</body>
</html>
